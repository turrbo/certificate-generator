<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mueller Reports - Certificate Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Open+Sans:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f0f0;
    font-family: 'Open Sans', sans-serif;
    padding: 20px;
  }

  /* ===== INPUT FORM ===== */
  .form-panel {
    max-width: 700px;
    margin: 0 auto 30px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .form-header {
    background: #C41230;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .form-header-logo {
    height: 30px;
  }

  .form-header h2 {
    font-family: 'Open Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .form-body {
    padding: 24px;
  }

  .form-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-size: 11px;
    font-weight: 600;
    color: #77777A;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .form-group input, .form-group select {
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    color: #333;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: #C41230;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 4px;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
  }

  .btn-generate {
    background: #C41230;
    color: #fff;
  }

  .btn-generate:hover {
    background: #a30f28;
  }

  .btn-print {
    background: #77777A;
    color: #fff;
  }

  .btn-print:hover {
    background: #5c5c5e;
  }

  .btn-clear {
    background: transparent;
    color: #999;
    border: 1.5px solid #ddd;
  }

  .btn-clear:hover {
    border-color: #999;
    color: #666;
  }

  .paste-hint {
    font-size: 11px;
    color: #999;
    margin-top: 12px;
    line-height: 1.5;
  }

  .paste-hint strong {
    color: #77777A;
  }

  /* Paste modal */
  .paste-area {
    margin-top: 12px;
    display: none;
  }

  .paste-area.visible {
    display: block;
  }

  .paste-area textarea {
    width: 100%;
    height: 140px;
    padding: 12px;
    border: 1.5px dashed #C41230;
    border-radius: 4px;
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    color: #555;
    resize: vertical;
    background: #fdf5f6;
  }

  .paste-area textarea:focus {
    outline: none;
    border-color: #C41230;
  }

  .paste-area textarea::placeholder {
    color: #caa;
  }

  .btn-parse {
    margin-top: 8px;
    background: #C41230;
    color: #fff;
  }

  .btn-toggle-paste {
    background: transparent;
    color: #C41230;
    border: 1.5px solid #C41230;
    font-size: 12px;
    padding: 8px 16px;
  }

  .btn-toggle-paste:hover {
    background: #fdf5f6;
  }

  /* ===== CERTIFICATE ===== */
  .certificate-wrapper {
    display: flex;
    justify-content: center;
  }

  .certificate {
    width: 1000px;
    min-height: 700px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .top-banner {
    background: #C41230;
    height: 8px;
    width: 100%;
  }

  .bottom-banner {
    background: #C41230;
    height: 8px;
    width: 100%;
    position: absolute;
    bottom: 0;
    left: 0;
  }

  .left-stripe {
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 6px;
    background: #C41230;
  }

  .right-stripe {
    position: absolute;
    right: 0;
    top: 8px;
    bottom: 8px;
    width: 6px;
    background: #C41230;
  }

  .inner-border {
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    bottom: 18px;
    border: 1.5px solid #d4d4d4;
    pointer-events: none;
  }

  .content {
    padding: 40px 60px 50px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo-section {
    margin-bottom: 8px;
  }

  .logo-section img {
    height: 48px;
    width: auto;
  }

  .tagline {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: #77777A;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: #C41230;
    margin: 0 auto 20px;
  }

  .award-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #C41230;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .award-subtitle {
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #77777A;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .presented-to {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #999;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .recipient-name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }

  .employee-id {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    color: #999;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }

  .divider-thin {
    width: 80px;
    height: 1px;
    background: #d4d4d4;
    margin: 0 auto 18px;
  }

  .description {
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    line-height: 1.7;
    color: #555;
    max-width: 650px;
    margin: 0 auto 22px;
  }

  .scores-section {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 24px;
  }

  .score-item {
    text-align: center;
  }

  .score-circle {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 3px solid #C41230;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
  }

  .score-value {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #C41230;
  }

  .score-max {
    font-size: 12px;
    color: #999;
  }

  .score-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #77777A;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .stars {
    color: #C41230;
    font-size: 16px;
    letter-spacing: 3px;
    margin-bottom: 22px;
  }

  .details-row {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-bottom: 12px;
  }

  .detail-item {
    text-align: center;
  }

  .detail-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .detail-value {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }

  .footer-note {
    font-family: 'Open Sans', sans-serif;
    font-size: 9px;
    color: #bbb;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: 400px;
    font-weight: 700;
    color: rgba(196, 18, 48, 0.03);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  @media print {
    body { background: none !important; padding: 0 !important; }
    .form-panel { display: none !important; }
    .certificate { box-shadow: none !important; }
    .certificate-wrapper { margin: 0; }
  }
</style>
</head>

  <div class="form-body">
    <div style="margin-bottom:16px;">
      <button class="btn btn-toggle-paste" onclick="togglePaste()">Paste Survey Email</button>
      <span class="paste-hint" style="margin-left:8px;">Paste the full survey email and fields auto-populate</span>
    </div>
    <div class="paste-area" id="pasteArea">
      <textarea id="emailPaste" placeholder="Paste the survey feedback email here...&#10;&#10;Example:&#10;Employee Name: John Smith (12345)&#10;Case #: 20499301&#10;Customer: PURE Insurance (1992)&#10;Description: Survey Type Completed: ELITE HIGH VALUE Appointment Date and Time: 3/17/2026 11:30:00 AM..."></textarea>
      <button class="btn btn-parse" onclick="parseEmail()">Parse Email</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Field Rep Name</label>
        <input type="text" id="repName">
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Employee ID #</label>
        <input type="text" id="repId">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="max-width:180px;">
        <label>Case #</label>
        <input type="text" id="caseNum">
      </div>
      <div class="form-group">
        <label>Customer</label>
        <input type="text" id="customer">
      </div>
      <div class="form-group" style="max-width:200px;">
        <label>Inspection Date</label>
        <input type="date" id="inspDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="max-width:220px;">
        <label>Survey Type</label>
        <input type="text" id="surveyType">
      </div>
      <div class="form-group" style="max-width:130px;">
        <label>Timeliness</label>
        <select id="scoreTime"><option value="5">5 / 5</option><option value="4">4 / 5</option><option value="3">3 / 5</option><option value="2">2 / 5</option><option value="1">1 / 5</option></select>
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Professionalism</label>
        <select id="scoreProf"><option value="5">5 / 5</option><option value="4">4 / 5</option><option value="3">3 / 5</option><option value="2">2 / 5</option><option value="1">1 / 5</option></select>
      </div>
      <div class="form-group" style="max-width:180px;">
        <label>Overall Satisfaction</label>
        <select id="scoreOverall"><option value="5">5 / 5</option><option value="4">4 / 5</option><option value="3">3 / 5</option><option value="2">2 / 5</option><option value="1">1 / 5</option></select>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-generate" onclick="generateCert()">Generate Certificate</button>
      <button class="btn btn-print" onclick="window.print()">Print / Save PDF</button>
      <button class="btn btn-clear" onclick="clearForm()">Clear</button>
    </div>

<script>
function togglePaste() {
  document.getElementById('pasteArea').classList.toggle('visible');
}

function parseEmail() {
  var text = document.getElementById('emailPaste').value;
  if (!text.trim()) return;

  // Employee Name: Jeffrey Myrdek (48985)
  var nameMatch = text.match(/Employee Name:\s*(.+?)\s*\((\d+)\)/i);
  if (nameMatch) {
    document.getElementById('repName').value = nameMatch[1].trim();
    document.getElementById('repId').value = nameMatch[2].trim();
  }

  // Case #: 20499301
  var caseMatch = text.match(/Case\s*#:\s*(\d+)/i);
  if (caseMatch) {
    document.getElementById('caseNum').value = caseMatch[1];
  }

  // Customer: PURE Insurance (1992)
  var custMatch = text.match(/Customer:\s*(.+?)(?:\s*\(\d+\))?$/im);
  if (custMatch) {
    document.getElementById('customer').value = custMatch[1].trim();
  }

  // Survey Type Completed: ELITE HIGH VALUE
  var surveyMatch = text.match(/Survey Type Completed:\s*(.+?)(?:\s+Appointment)/i);
  if (surveyMatch) {
    document.getElementById('surveyType').value = surveyMatch[1].trim();
  }

  // Appointment Date and Time: 3/17/2026 11:30:00 AM
  var dateMatch = text.match(/Appointment Date and Time:\s*(\d{1,2})\/(\d{1,2})\/(\d{4})/i);
  if (dateMatch) {
    var m = dateMatch[1].padStart(2, '0');
    var d = dateMatch[2].padStart(2, '0');
    var y = dateMatch[3];
    document.getElementById('inspDate').value = y + '-' + m + '-' + d;
  }

  // Scores
  var timeMatch = text.match(/Timeliness Score:\s*(\d)/i);
  if (timeMatch) document.getElementById('scoreTime').value = timeMatch[1];

  var profMatch = text.match(/Professionalism Score:\s*(\d)/i);
  if (profMatch) document.getElementById('scoreProf').value = profMatch[1];

  var overallMatch = text.match(/OverallSatisfaction Score:\s*(\d)/i);
  if (!overallMatch) overallMatch = text.match(/Overall\s*Satisfaction Score:\s*(\d)/i);
  if (overallMatch) document.getElementById('scoreOverall').value = overallMatch[1];

  generateCert();
  document.getElementById('pasteArea').classList.remove('visible');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var parts = dateStr.split('-');
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}

function generateCert() {
  var name = document.getElementById('repName').value || 'Field Representative';
  var id = document.getElementById('repId').value || '-----';
  var caseNum = document.getElementById('caseNum').value || '-----';
  var customer = document.getElementById('customer').value || 'Customer';
  var inspDate = document.getElementById('inspDate').value;
  var surveyType = document.getElementById('surveyType').value || 'Property Survey';
  var sTime = document.getElementById('scoreTime').value;
  var sProf = document.getElementById('scoreProf').value;
  var sOverall = document.getElementById('scoreOverall').value;

  var dateFormatted = inspDate ? formatDate(inspDate) : 'Date Pending';
  var surveyUpper = surveyType.toUpperCase();

  document.getElementById('certName').textContent = name;
  document.getElementById('certId').textContent = 'Employee ID: ' + id;
  document.getElementById('certCase').textContent = caseNum;
  document.getElementById('certCustomer').textContent = customer;
  document.getElementById('certSurvey').textContent = surveyType;
  document.getElementById('certDate').textContent = dateFormatted;

  // Average score for star display
  var avg = (parseInt(sTime) + parseInt(sProf) + parseInt(sOverall)) / 3;
  var starCount = Math.round(avg);
  var allPerfect = (sTime === '5' && sProf === '5' && sOverall === '5');
  var subtitle = allPerfect ? 'Perfect Customer Satisfaction' : 'Customer Satisfaction Award';
  document.querySelector('.award-subtitle').textContent = subtitle;

  // Score text
  var scoreWord = allPerfect ? 'perfect score' : 'outstanding scores';
  document.getElementById('certDesc').innerHTML =
    'In recognition of achieving <strong>' + scoreWord + '</strong> on a policyholder inspection survey for a' +
    (surveyUpper.match(/^[AEIOU]/) ? 'n' : '') +
    ' <strong>' + surveyUpper + '</strong> property survey conducted for <strong>' + customer +
    '</strong>. Your timeliness, professionalism, and dedication to delivering an outstanding customer experience exemplify the Mueller standard of excellence.';

  document.getElementById('certScoreTime').innerHTML = sTime + '<span class="score-max">/5</span>';
  document.getElementById('certScoreProf').innerHTML = sProf + '<span class="score-max">/5</span>';
  document.getElementById('certScoreOverall').innerHTML = sOverall + '<span class="score-max">/5</span>';

  var stars = '';
  for (var i = 0; i < starCount; i++) stars += '\u2605 ';
  for (var j = starCount; j < 5; j++) stars += '\u2606 ';
  document.getElementById('certStars').textContent = stars.trim();

  var today = new Date();
  var todayStr = ['January','February','March','April','May','June','July','August','September','October','November','December'][today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();
  document.getElementById('certFooter').textContent = 'Logged by Policy Holder \u00B7 ' + todayStr;
}

function clearForm() {
  document.getElementById('repName').value = '';
  document.getElementById('repId').value = '';
  document.getElementById('caseNum').value = '';
  document.getElementById('customer').value = '';
  document.getElementById('inspDate').value = '';
  document.getElementById('surveyType').value = '';
  document.getElementById('scoreTime').value = '5';
  document.getElementById('scoreProf').value = '5';
  document.getElementById('scoreOverall').value = '5';
  document.getElementById('emailPaste').value = '';
}
</script>
